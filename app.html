<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GhostGram App</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>👻 GhostGram</h1>

    <div id="cardContainer"></div>

    <div class="actions">
      <button onclick="swipe('left')">❌</button>
      <button onclick="like()">❤️ <span id="likesCount">0</span></button>
      <button onclick="saveProfile()">💾</button>
      <button onclick="shareProfile()">🔗</button>
      <button onclick="swipe('right')">➡️</button>
    </div>

    <h2>Saved Profiles</h2>
    <div id="saved" class="saved-grid"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
