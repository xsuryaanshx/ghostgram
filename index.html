<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SiteClone</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 800px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .input-box {
      display: flex;
      background: #111827;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: white;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    .card {
      margin-top: 30px;
      background: #111827;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      max-height: 400px;
      overflow-y: auto;
    }

    .section {
      margin-bottom: 20px;
    }

    .section h3 {
      margin-bottom: 10px;
      color: #22c55e;
    }

    .loader {
      margin-top: 20px;
      display: none;
    }

    .spinner {
      border: 4px solid #1f2937;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #64748b;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 SiteClone</h1>
    <p>Extract HTML, CSS & JS from any website instantly</p>

    <div class="input-box">
      <input id="urlInput" placeholder="https://example.com" />
      <button onclick="cloneSite()">Clone</button>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <div class="card" id="result" style="display:none;"></div>

    <div class="footer">
      Built by you 😎
    </div>
  </div>

  <script>
    async function cloneSite() {
      const url = document.getElementById("urlInput").value;
      const result = document.getElementById("result");
      const loader = document.getElementById("loader");

      if (!url) return alert("Enter a valid URL");

      result.style.display = "none";
      loader.style.display = "block";

      try {
        const res = await fetch(`https://YOUR-RAILWAY-URL/clone?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        loader.style.display = "none";
        result.style.display = "block";

        result.innerHTML = `
          <div class="section">
            <h3>HTML Preview</h3>
            <pre>${escapeHtml(data.html.substring(0, 1500))}</pre>
          </div>

          <div class="section">
            <h3>CSS Files (${data.css.length})</h3>
            ${data.css.map(link => `<div>${link}</div>`).
