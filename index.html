<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ghost Influencer</title>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }

    .profile {
      margin-top: 30px;
    }

    img {
      border-radius: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .post {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>👩‍💻 Ghost Influencer Generator</h1>
  <button onclick="generate()">Generate Influencer</button>

  <div id="output"></div>

  <script>
    const names = [
      "Samantha Lee", "Ava Sharma", "Elena Rossi",
      "Mia Collins", "Sofia Verma", "Isabella Khan"
    ];

    const bios = [
      "✨ Living soft & aesthetic life",
      "☕ Coffee | Travel | Calm vibes",
      "🌸 Building my dream life",
      "📍 Italy | Fashion | Lifestyle",
      "💫 Minimal | Mindful | Modern",
      "🌿 Slow living & self love"
    ];

    const captions = [
      "just another soft day ✨",
      "romanticizing my life 💭",
      "little moments matter 🌸",
      "this vibe >>>",
      "caught in a calm mood ☕",
      "main character energy 💫",
      "late night thoughts 🌙",
      "soft mornings hit different 🌿"
    ];

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generatePosts() {
      let posts = "";
      for (let i = 0; i < 6; i++) {
        const img = `https://source.unsplash.com/300x300/?girl,${Math.random()}`;
        posts += `
          <div class="post">
            <img src="${img}" width="100%" />
            <p>${getRandom(captions)}</p>
          </div>
        `;
      }
      return posts;
    }

    function generate() {
      const name = getRandom(names);
      const bio = getRandom(bios);
      const profileImg = `https://source.unsplash.com/200x200/?portrait,${Math.random()}`;

      document.getElementById("output").innerHTML = `
        <div class="profile">
          <h2>${name}</h2>
          <p>${bio}</p>
          <img src="${profileImg}" width="150"/>
        </div>

        <div class="grid">
          ${generatePosts()}
        </div>
      `;
    }
  </script>

</body>
</html>
