<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ghost Influencer</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>📸 Ghost Influencer</h1>

    <button onclick="generate()">Generate Profile</button>

    <div id="profile" class="hidden">

      <div class="header">
        <img id="profileImg" />
        <div class="info">
          <h2 id="name"></h2>
          <p id="bio"></p>

          <div class="stats">
            <div><strong id="postsCount">0</strong> posts</div>
            <div><strong id="followers">0</strong> followers</div>
            <div><strong id="following">0</strong> following</div>
          </div>
        </div>
      </div>

      <div class="grid" id="grid"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
