<!DOCTYPE html>
<html lang="en">

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 52px;
    }

    p {
      color: #94a3b8;

    }

      color: black;

    .card {

      margin: 40px auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 15px;
    }

    img {
      width: 100%;

    }

</head>

</html>
